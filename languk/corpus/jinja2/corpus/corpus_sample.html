{% extends "bachoo_base.html" %}
{% from 'corpus/_macro.html' import article_excerpt with context %}

{% block page_content %}
    <div class="article">
      <div class="article__content">
        <p class="h1">{{ _("Джерело") }} «{{ source.title }}»</p>
        <p class="h3">{{ _("Вибірка") }} «{{ sample.title }}»</p>

        {% for doc in sample.documents %}
          {{ article_excerpt(doc) }}
        {% endfor %}
      </div>
    </div>
{% endblock %}
